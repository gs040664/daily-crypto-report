name: Daily Crypto TA Report

on:
  schedule:
    # 每天早上 8:00 (UTC+8) -> 轉換為 UTC 時間是 0:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-report-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 Action 寫入並推播 Commit 回 Repo
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Crypto Report
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_crypto_report.py
        
      - name: Commit and Push Data Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "📈 Auto-update crypto history data [skip ci]" || echo "No data changes to commit"
          git push
